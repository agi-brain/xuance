agent: "QMIX"
env_name: "SMACv2"
env_id: "10gen_zerg"
env_seed: 1
fps: 15
learner: "QMIX_Learner"
policy: "Mixing_Q_network"
representation: "Basic_RNN"
vectorize: "Subproc_StarCraft2"
runner: "RunnerStarCraft2"

n_units: 10
n_enemies: 11
unit_types: ["zergling", "baneling", "hydralisk"]
unit_weights: [0.5, 0.2, 0.3]
exception_unit_types: ["baneling"]
start_dist_type: "surrounded_and_reflect"
start_p: 0.5
map_x: 32
map_y: 32

use_rnn: True
rnn: "GRU"
N_recurrent_layers: 1
fc_hidden_sizes: [64, ]
recurrent_hidden_size: 64
dropout: 0

representation_hidden_size: [64, ]
q_hidden_size: [64, ]
activation: "relu"
use_parameter_sharing: True
use_actions_mask: True

hidden_dim_mixing_net: 32
hidden_dim_hyper_net: 32

seed: 1
parallels: 8
buffer_size: 5000
batch_size: 32
learning_rate: 0.0007
gamma: 0.99
double_q: True

start_greedy: 1.0
end_greedy: 0.05
decay_step_greedy: 50000
start_training: 1000
running_steps: 2000000
n_epochs: 8
sync_frequency: 200

use_grad_clip: False
grad_clip_norm: 0.5

eval_interval: 10000
test_episode: 16

log_dir: "logs/qmix_smacv2/"
model_dir: "models/qmix_smacv2/"
